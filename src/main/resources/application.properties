# ─────────────────────────────────────────────────────────
# application.properties
#
# Reads database config from environment variables so this
# same file works both in Docker (postgres) and local dev.
#
# Docker env vars set in docker-compose.yml:
#   DB_URL      → jdbc:postgresql://db:5432/taskdb
#   DB_USERNAME → postgres
#   DB_PASSWORD → postgres
#
# For plain `mvn spring-boot:run` (no Docker), make sure
# PostgreSQL is running locally and either:
#   • set those env vars yourself, or
#   • override them in a local application-local.properties
# ─────────────────────────────────────────────────────────

# Application
spring.application.name=task-manager-api
server.port=8080

# ── DataSource (reads env vars injected by docker-compose) ─
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ────────────────────────────────────────────
logging.level.com.example.taskmanager=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Swagger / OpenAPI ─────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
