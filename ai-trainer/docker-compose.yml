services:
  db:
    image: postgres:16-alpine
    container_name: trainer-db
    environment:
      POSTGRES_DB: trainerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432" # We'll use port 5433 on your computer to avoid conflict with port 5432
    volumes:
      - trainer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trainerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  trainer_data:
