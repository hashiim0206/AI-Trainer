spring.application.name=ai-trainer
server.port=${PORT:8082}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/trainerdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (We'll use this later)
app.jwt.secret=${JWT_SECRET:your-very-secure-and-very-long-secret-key-that-should-be-at-least-32-characters}
app.jwt.expiration-ms=86400000

# ── Groq AI (Free alternative to Gemini) ──────────────
# Get your free key at: console.groq.com (no credit card needed)
# Paste your key below:
groq.api.key=${GROQ_API_KEY:gsk_your_groq_api_key_here}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant
