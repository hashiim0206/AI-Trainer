# ─────────────────────────────────────────────────────────
# docker-compose.yml
#
# Spins up two containers:
#   1. db  → PostgreSQL 16 database
#   2. app → Spring Boot Task Manager API
#
# Usage:
#   docker-compose up --build     (first time or after code changes)
#   docker-compose up             (subsequent runs)
#   docker-compose down           (stop and remove containers)
#   docker-compose down -v        (also remove the database volume)
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"           # Map container port 5432 → host port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist data across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Application ─────────────────────────
  app:
    build: .                  # Build image using our Dockerfile
    container_name: task-manager-app
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be ready before starting app
    environment:
      # These env vars are read by application.properties:
      # spring.datasource.url=${DB_URL}
      DB_URL: jdbc:postgresql://db:5432/taskdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"           # Map container 8080 → host 8080
    restart: on-failure

# ── Named Volume ────────────────────────────────────────
# Stores PostgreSQL data on the host machine → survives container restarts
volumes:
  postgres_data:
