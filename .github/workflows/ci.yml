name: CI — Task Manager API

# Trigger: runs on every push and pull request to main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── Job 1: Build & Test ─────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven         # Caches .m2 directory for faster runs

      # Step 3: Run all tests (uses H2 in-memory DB — no PostgreSQL needed)
      - name: Run Tests
        run: mvn test -B       # -B = batch mode (no interactive prompts)

      # Step 4: Build the application JAR (skip tests — already ran above)
      - name: Build JAR
        run: mvn package -DskipTests -B

      # Step 5: Upload test reports as artifacts for visibility
      - name: Upload Test Report
        if: always()           # Run even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── Job 2: Docker Build Validation ──────────────────
  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test      # Only runs after tests pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build Docker image to validate Dockerfile is correct
      - name: Build Docker Image
        run: docker build -t task-manager-api:ci .
